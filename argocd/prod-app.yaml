apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team1-prod-chatguard        
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/CLD-05/team1-chatguard-config' 
    targetRevision: HEAD
    path: overlays/prod              
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: chatguard
  syncPolicy:
    automated:
      prune: true     # Git에서 지우면 실제 k8s에서도 자동 삭제
      selfHeal: true  # 수동 변경 감지 시 Git 상태로 자동 원상복구
    syncOptions:
      - RespectIgnoreDifferences=true
  ignoreDifferences:
      - group: apps
        kind: Deployment
        name: team1-prod-moderation-worker
        jsonPointers:
        - /spec/replicas
      # chat-server는 KEDA(가 만드는 HPA)가 replicas를 관리 → selfHeal이 되돌리지 않도록 무시(dev-app과 대칭).
      - group: apps
        kind: Deployment
        name: team1-prod-chat-server
        jsonPointers:
        - /spec/replicas