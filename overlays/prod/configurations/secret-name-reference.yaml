nameReference:
- kind: Secret
  version: v1
  fieldSpecs:
  # 1. envFrom 방식 기본 추적 경로
  - path: spec/template/spec/containers/envFrom/secretRef/name
    kind: Deployment
  - path: spec/template/spec/initContainers/envFrom/secretRef/name
    kind: Deployment

  # 2. 챗 서버의 독특한 독립 secretRef 배열 구조 정밀 타격 경로
  - path: spec/template/spec/containers/secretRef/name
    kind: Deployment
  - path: spec/template/spec/initContainers/secretRef/name
    kind: Deployment

  # 3. env 개별 key 변수 추적 경로
  - path: spec/template/spec/containers/env/valueFrom/secretKeyRef/name
    kind: Deployment
  - path: spec/template/spec/initContainers/env/valueFrom/secretKeyRef/name
    kind: Deployment
