apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chatguard-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: team1-prod-aws-secret-store
    kind: ClusterSecretStore
  target:
    name: chatguard-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: rds!db-09602fb4-1888-4c52-8582-aa78c2da3c22
        property: password
    - secretKey: DB_USER
      remoteRef:
        key: rds!db-09602fb4-1888-4c52-8582-aa78c2da3c22
        property: username

    # JWT 암호화 키 등 추가 보안 환경변수 연동 필요 시 아래 구조를 확장
    - secretKey: JWT_SECRET
      remoteRef:
        key: team1-prod-jwt-credentials
        property: secret_key
