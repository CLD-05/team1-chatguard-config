apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chatguard
namePrefix: team1-prod-

resources:
  - ../../base
  - externalsecret.yaml 
  - clustersecretstore.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: moderation-worker
      spec:
        replicas: 2
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
      spec:
        replicas: 2
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: chat-server-hpa
      spec:
        minReplicas: 3
  - path: patches/ingress-tags.yaml
  # fix#2: api-server-sa role-arn prod 정정.
  # namePrefix(team1-prod-)는 SA *이름*만 리라이트하고 annotation *값*은 안 건드림 →
  # base의 dev role(team1-dev-chat-server-s3-role)이 prod로 누수. base 이름 api-server-sa로
  # 매칭(패치는 namePrefix 이전 이름)해 prod role ARN(C1, infra iam.tf)으로 교체.
  - patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: api-server-sa
        namespace: chatguard   # base SA가 namespace 명시 → 패치 target ID도 동일 ns여야 매칭
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::495599735720:role/team1-prod-chat-server-s3-role

# prod배포 후 확인
images:
  - name: team1-dev-api-server
    newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-prod-api-server
    newTag: 947704d1322ab1575b0099d8c1616a67bce17341   
  - name: team1-dev-ai-worker
    newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-prod-ai-worker
    newTag: 947704d1322ab1575b0099d8c1616a67bce17341

# 운영계 실물 인프라(RDS, Redis) 주소를 주입하는 블록
configMapGenerator:
  - name: chatguard-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:mysql://team1-prod-db.cne4w2cys26c.ap-northeast-2.rds.amazonaws.com:3306/chatguard
      - REDIS_HOST=team1-prod-redis.9iaedf.ng.0001.apn2.cache.amazonaws.com
      - REDIS_PORT=6379
      # fix#1: base는 dev 버킷(team1-dev-chatguard-migration) 하드코딩 → configmap 값은
      # namePrefix 미적용이라 prod에 누수. prod 금칙어 버킷(C2, infra main.tf)으로 override.
      - AWS_S3_BUCKET=team1-prod-banned-words

configurations:
  - configurations/secret-name-reference.yaml
  