apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chatguard
namePrefix: team1-prod-

resources:
- ../../base
- externalsecret.yaml
- clustersecretstore.yaml
- prometheus-rules-prod.yaml

  # D13: prod worker floor=2. base ScaledObject는 dev용 minReplicaCount:1이라, prod에서만
  # 2로 올려 KEDA 실효 floor를 D13에 맞춘다(Deployment replicas:2는 KEDA 인계 전 초기값일 뿐).
  # 구 chat-server HPA minReplicas:3 승계 — KEDA 일원화로 ScaledObject floor 패치로 교체.
  # fix#2: api-server-sa role-arn prod 정정.
  # namePrefix(team1-prod-)는 SA *이름*만 리라이트하고 annotation *값*은 안 건드림 →
  # base의 dev role(team1-dev-chat-server-s3-role)이 prod로 누수. base 이름 api-server-sa로
  # 매칭(패치는 namePrefix 이전 이름)해 prod role ARN(C1, infra iam.tf)으로 교체.
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: moderation-worker
    spec:
      replicas: 2
- patch: |-
    apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    metadata:
      name: moderation-worker
    spec:
      minReplicaCount: 2
      maxReplicaCount: 10   # E2 실측(7/03): 파드당 ~5.4msg/s → 10대 ≈54/s > 유입 49/s. base 캡 5의 DB 천장 계산은 chat max5 동시 도달 시에만 초과(worker50+chat50=100>85) — E3 프로파일은 chat 3파드(합 80<85)
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
    spec:
      replicas: 2
- patch: |-
    apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    metadata:
      name: chat-server
    spec:
      minReplicaCount: 3
- path: patches/ingress-tags.yaml
- patch: |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: api-server-sa
      namespace: chatguard   # base SA가 namespace 명시 → 패치 target ID도 동일 ns여야 매칭
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::495599735720:role/team1-prod-chat-server-s3-role

# prod배포 후 확인
images:
- name: team1-dev-ai-worker
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-prod-ai-worker
  newTag: b3fe865c9806c72b507b1f5b8f44aaa16ec00715
- name: team1-dev-api-server
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-prod-api-server
  newTag: b3fe865c9806c72b507b1f5b8f44aaa16ec00715
- name: team1-dev-frontend
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-prod-frontend
  newTag: b3fe865c9806c72b507b1f5b8f44aaa16ec00715

# 운영계 실물 인프라(RDS, Redis) 주소를 주입하는 블록
      # fix#1: base는 dev 버킷(team1-dev-chatguard-migration) 하드코딩 → configmap 값은
      # namePrefix 미적용이라 prod에 누수. prod 금칙어 버킷(C2, infra main.tf)으로 override.
configMapGenerator:
- behavior: merge
  literals:
  - SPRING_PROFILES_ACTIVE=prod
  - DB_URL=jdbc:mysql://team1-prod-db.cne4w2cys26c.ap-northeast-2.rds.amazonaws.com:3306/chatguard
  - REDIS_HOST=team1-prod-redis.9iaedf.ng.0001.apn2.cache.amazonaws.com
  - REDIS_PORT=6379
  - AWS_S3_BUCKET=team1-prod-banned-words
  name: chatguard-config

configurations:
- configurations/secret-name-reference.yaml
