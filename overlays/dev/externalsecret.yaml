# overlays/dev/externalsecret.yaml
# K8s Secret `chatguard-secrets`를 AWS Secrets Manager
# `team1-dev-database-credentials` 한 곳에서 동기화한다.
# 필요한 5키만 명시적으로 가져온다(dataFrom 미사용 — 시크릿에 의도치 않은 키가
# 섞여도 envFrom에서 ConfigMap을 덮지 않도록 콕 집어 읽는다).
#   infra 동적 주입: DB_URL · REDIS_HOST · DB_USER
#   사람 주입:       DB_PASSWORD · JWT_SECRET
#   (REDIS_PORT는 안정값이라 ConfigMap에서 공급 — 여기서 안 읽음)
# 시크릿 JSON 키 = property = secretKey 모두 대문자 동일.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chatguard-secrets
  namespace: chatguard
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: team1-dev-aws-secret-store
    kind: ClusterSecretStore
  target:
    name: chatguard-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: team1-dev-database-credentials
        property: DB_URL
    - secretKey: REDIS_HOST
      remoteRef:
        key: team1-dev-database-credentials
        property: REDIS_HOST
    - secretKey: DB_USER
      remoteRef:
        key: team1-dev-database-credentials
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: team1-dev-database-credentials
        property: DB_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: team1-dev-database-credentials
        property: JWT_SECRET
