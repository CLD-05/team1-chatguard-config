# overlays/dev/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chatguard

resources:
- ../../base

patches:
- path: replicas-patch.yaml

# ★ deploy.yml의 `kustomize edit set image`가 이 블록의 newTag를 git SHA로 자동 갱신.
#   newName = ECR URL. apply 후 첫 파이프라인 실행 전까지 newTag는 placeholder.
images:
- name: team1-dev-ai-worker
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-dev-ai-worker
  newTag: PLACEHOLDER
- name: team1-dev-api-server
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-dev-api-server
  newTag: PLACEHOLDER
- name: team1-dev-frontend
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-dev-frontend
  newTag: PLACEHOLDER