- name: team1-dev-api-server
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-dev-api-server
  newTag: 11ff9ca9b18b3f1b9474418494f416c2173de97c
- name: team1-dev-frontend
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-dev-frontend
  newTag: 11ff9ca9b18b3f1b9474418494f416c2173de97c

configurations:
