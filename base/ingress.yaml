apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatguard-ingress
  namespace: chatguard
  annotations:
    alb.ingress.kubernetes.io/tags: "Team=team1,Environment=dev,Project=chatguard"
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80