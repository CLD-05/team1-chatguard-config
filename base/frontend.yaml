# base/frontend.yaml
# Frontend (React → nginx 정적 서빙, 기존 Dockerfile). 포트 80.
# 외부 노출(Ingress/ALB)은 LBC 소관(§4) — 여기 미포함. ClusterIP만.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: team1-dev-frontend
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
