# base/kustomization.yaml — 환경 무관 공통.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - chat-server.yaml
  - worker.yaml
  - frontend.yaml

# 공통 라벨 — 모든 리소스에 부착(운영 식별).
labels:
  - pairs:
      app.kubernetes.io/part-of: chatguard
    includeSelectors: false
