# base/chat-server.yaml
# Chat Server (Spring Boot, WS+REST 한 앱). A-5: 포트 8080, /actuator/health·/actuator/prometheus.
# image 태그·replicas는 overlay가 채운다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-server
  labels:
    app: chat-server
spec:
  selector:
    matchLabels:
      app: chat-server
  template:
    metadata:
      labels:
        app: chat-server
    spec:
      securityContext:
        runAsNonRoot: true # Dockerfile USER app(D31)과 정합
      containers:
        - name: chat-server
          # 이름만 고정 — overlay images:가 ECR URL+SHA로 덮는다.
          # deploy.yml의 kustomize edit set image 대상과 글자 단위 일치 인터페이스.
          image: team1-dev-api-server
          ports:
            - containerPort: 8080
          # 비밀 아닌 값 전부 + 시크릿 전부를 envFrom으로 일괄 주입.
          envFrom:
            - configMapRef:
                name: chatguard-config
            - secretRef:
                name: chatguard-secrets # DB_USER·DB_PASSWORD·JWT_SECRET (공급자: 수동→ESO)
          startupProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            failureThreshold: 30
            periodSeconds: 5 # 최대 150s까지 기동 대기(WS 앱·DB 연결)
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: chat-server
  labels:
    app: chat-server
spec:
  selector:
    app: chat-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
