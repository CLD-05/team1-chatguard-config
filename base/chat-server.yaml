# base/chat-server.yaml
# Chat Server (Spring Boot, WS+REST 한 앱). A-5: 포트 8080, /actuator/health·/actuator/prometheus.
# image 태그·replicas는 overlay가 채운다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-server
  labels:
    app: chat-server
spec:
  selector:
    matchLabels:
      app: chat-server
  template:
    metadata:
      labels:
        app: chat-server
    spec:
      serviceAccountName: api-server-sa
      # HA(D54/FIS): 파드를 AZ·노드에 고르게 분산. ScheduleAnyway(소프트)라 노드 부족 시 스케줄 실패는 안 냄.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chat-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chat-server
      securityContext:
        runAsNonRoot: true # Dockerfile USER app(D31)과 정합
        runAsUser: 999 # ← 추가
        runAsGroup: 999 # ← 추가
      # D15: preStop(10s) + Spring graceful(30s) + 여유 = 60s
      terminationGracePeriodSeconds: 60
      containers:
        - name: chat-server
          # 이름만 고정 — overlay images:가 ECR URL+SHA로 덮는다.
          # deploy.yml의 kustomize edit set image 대상과 글자 단위 일치 인터페이스.
          image: team1-dev-api-server
          ports:
            - name: http
              containerPort: 8080
          # D15: ALB가 타깃그룹에서 이 파드를 제거할 시간 확보
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
          # 비밀 아닌 값 전부 + 시크릿 전부를 envFrom으로 일괄 주입.
          envFrom:
            - configMapRef:
                name: chatguard-config
            - secretRef:
                name: chatguard-secrets # DB_USER·DB_PASSWORD·JWT_SECRET (공급자: 수동→ESO)
          env:
            # /actuator/health/liveness 그룹 명시 활성화 — k8s 자동감지 암묵 의존 제거(프로브 계약 고정)
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
          # 프로브 분리: liveness/startup=프로세스 생존만(/health/liveness) — 의존성(redis·DB) 장애가
          # 파드 kill·신규 파드 startup 연쇄 kill로 번지지 않게. readiness만 의존성 집계로 트래픽 차단.
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            failureThreshold: 30
            periodSeconds: 5 # 최대 150s까지 기동 대기(WS 앱·DB 연결)
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            timeoutSeconds: 3 # 1(기본)→3: GC 등 순간 지연 내성
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            timeoutSeconds: 5 # 1(기본)→5: redis 타임아웃 3s+여유
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: chat-server
  labels:
    app: chat-server
  annotations:
    # LBC는 Service에 붙인 헬스체크 어노테이션을 그 Service의 타깃그룹에 적용 → chat-server 전용 헬스체크 분리(D47).
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    # D18: LOR=새 연결을 가장 한가한 pod로. D15: 짧은 dereg delay=능동 1001 close 기반 graceful drain에 맞춤.
    alb.ingress.kubernetes.io/target-group-attributes: load_balancing.algorithm.type=least_outstanding_requests,deregistration_delay.timeout_seconds=30
spec:
  selector:
    app: chat-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
