# base/configmap.yaml
# 안 바뀌는 공통 env만 둔다(A-5 env 계약). git에 두기 적합한 안정값.
# 변동값(DB_URL·REDIS_HOST·DB_USER)과 시크릿(DB_PASSWORD·JWT_SECRET)은
# K8s Secret `chatguard-secrets`(ESO)가 공급(envFrom). REDIS_PORT는 안정값이라 여기.
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatguard-config
data:
  REDIS_PORT: "6379"
  MOD_QUEUE_KEY: "mod:queue"
  ROOM_CHANNEL_PREFIX: "room:"
  CONFIG_CHANNEL_PREFIX: "config:"   # D42 금칙어 무효화 채널 — 누락분 복구
  MODEL_VERSION: "unsmile-weighted-v1"
  WS_CONNECTION_CAP: "200"  # D18: 파드당 WS 연결 상한 — 부하테스트 후 재확정
  AWS_S3_BUCKET: team1-dev-chatguard-migration
  AWS_S3_KEY: banned_words.txt
  AWS_REGION: ap-northeast-2
